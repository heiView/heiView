name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 92.5.99.210
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
          set -e
          cd ~/heiView
          git pull origin main
          npm install
          npm run build
          pm2 restart heiview-api
